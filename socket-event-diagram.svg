<svg viewBox="0 0 1000 720" xmlns="http://www.w3.org/2000/svg" font-family="Arial, Helvetica, sans-serif">
  <rect width="1000" height="720" fill="#ffffff"/>

  <text x="500" y="40" text-anchor="middle" font-size="24" font-weight="bold" fill="#1a1a2e">Queue Cure — Socket.IO Event Flow</text>

  <!-- Client boxes -->
  <rect x="40" y="90" width="220" height="70" rx="10" fill="#e8f0fe" stroke="#3b5bdb" stroke-width="2"/>
  <text x="150" y="120" text-anchor="middle" font-size="15" font-weight="bold" fill="#1a1a2e">Receptionist Client</text>
  <text x="150" y="140" text-anchor="middle" font-size="12" fill="#555">Receptionist.jsx</text>

  <rect x="40" y="560" width="220" height="70" rx="10" fill="#e8f0fe" stroke="#3b5bdb" stroke-width="2"/>
  <text x="150" y="590" text-anchor="middle" font-size="15" font-weight="bold" fill="#1a1a2e">Waiting Room Client</text>
  <text x="150" y="610" text-anchor="middle" font-size="12" fill="#555">WaitingRoom.jsx</text>

  <!-- Server box -->
  <rect x="700" y="320" width="260" height="100" rx="10" fill="#fff4e6" stroke="#e8590c" stroke-width="2"/>
  <text x="830" y="355" text-anchor="middle" font-size="16" font-weight="bold" fill="#1a1a2e">Express + Socket.IO</text>
  <text x="830" y="375" text-anchor="middle" font-size="12" fill="#555">In-memory queue state</text>
  <text x="830" y="392" text-anchor="middle" font-size="12" fill="#555">(server.js)</text>

  <!-- Outgoing events from Receptionist to Server -->
  <g font-size="12" fill="#1a1a2e">
    <line x1="260" y1="105" x2="700" y2="335" stroke="#3b5bdb" stroke-width="1.5" marker-end="url(#arrow)"/>
    <text x="430" y="180" text-anchor="middle">add-patient { name, phone }</text>

    <line x1="260" y1="115" x2="700" y2="345" stroke="#3b5bdb" stroke-width="1.5" marker-end="url(#arrow)"/>
    <text x="430" y="205" text-anchor="middle">call-next</text>

    <line x1="260" y1="125" x2="700" y2="355" stroke="#3b5bdb" stroke-width="1.5" marker-end="url(#arrow)"/>
    <text x="430" y="230" text-anchor="middle">set-avg-time (minutes)</text>

    <line x1="260" y1="135" x2="700" y2="365" stroke="#3b5bdb" stroke-width="1.5" marker-end="url(#arrow)"/>
    <text x="430" y="255" text-anchor="middle">pause-queue { reason }</text>

    <line x1="260" y1="145" x2="700" y2="375" stroke="#3b5bdb" stroke-width="1.5" marker-end="url(#arrow)"/>
    <text x="430" y="280" text-anchor="middle">resume-queue</text>

    <line x1="260" y1="155" x2="700" y2="385" stroke="#3b5bdb" stroke-width="1.5" marker-end="url(#arrow)"/>
    <text x="430" y="305" text-anchor="middle">toggle-queue</text>
  </g>

  <!-- Broadcast back to both clients -->
  <g font-size="12" fill="#e8590c">
    <line x1="700" y1="395" x2="260" y2="135" stroke="#e8590c" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrowOrange)"/>
    <line x1="700" y1="410" x2="260" y2="585" stroke="#e8590c" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#arrowOrange)"/>
    <text x="500" y="470" text-anchor="middle" font-weight="bold">state-update</text>
    <text x="500" y="488" text-anchor="middle" font-size="11">{ queue, currentToken, avgConsultationTime,</text>
    <text x="500" y="503" text-anchor="middle" font-size="11">tokenCounter, queueOpen, queuePauseReason, queuePauseDelay }</text>
    <text x="500" y="525" text-anchor="middle" font-size="11">broadcast to ALL connected clients on every state change</text>
  </g>

  <!-- queue-error -->
  <g font-size="12" fill="#c92a2a">
    <line x1="700" y1="340" x2="260" y2="110" stroke="#c92a2a" stroke-width="1.5" stroke-dasharray="2,2" marker-end="url(#arrowRed)"/>
    <text x="850" y="445" text-anchor="middle" font-style="italic" fill="#c92a2a">queue-error (msg)</text>
    <text x="850" y="462" text-anchor="middle" font-size="11" fill="#555">sent only to the sender,</text>
    <text x="850" y="477" text-anchor="middle" font-size="11" fill="#555">e.g. queue closed/paused</text>
  </g>

  <!-- connection -->
  <text x="830" y="280" text-anchor="middle" font-size="12" fill="#555" font-style="italic">on new connection → server emits</text>
  <text x="830" y="296" text-anchor="middle" font-size="12" fill="#555" font-style="italic">initial state-update to that client only</text>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#3b5bdb"/>
    </marker>
    <marker id="arrowOrange" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#e8590c"/>
    </marker>
    <marker id="arrowRed" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#c92a2a"/>
    </marker>
  </defs>

  <!-- Legend -->
  <rect x="40" y="650" width="920" height="55" rx="8" fill="#f8f9fa" stroke="#dee2e6"/>
  <line x1="60" y1="668" x2="100" y2="668" stroke="#3b5bdb" stroke-width="2"/>
  <text x="110" y="672" font-size="12" fill="#1a1a2e">Client → Server (action events)</text>
  <line x1="340" y1="668" x2="380" y2="668" stroke="#e8590c" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="390" y="672" font-size="12" fill="#1a1a2e">Server → All Clients (state broadcast)</text>
  <line x1="700" y1="668" x2="740" y2="668" stroke="#c92a2a" stroke-width="2" stroke-dasharray="2,2"/>
  <text x="750" y="672" font-size="12" fill="#1a1a2e">Server → Sender only (error)</text>
</svg>
